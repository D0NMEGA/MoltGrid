name: Deploy API to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify API health
        run: |
          sleep 15
          curl -sf https://api.moltgrid.net/v1/health | python3 -m json.tool
          echo "VPS deployed and healthy (self-deploys via deploy.sh on push)"
