name: Deploy API to VPS

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx pytest-timeout
          pip install -r requirements.txt

      - name: Run tests
        env:
          TESTING: "1"
          DB_BACKEND: sqlite
          MOLTGRID_DB: test_moltgrid.db
          TURNSTILE_SECRET_KEY: ""
          ADMIN_PASSWORD_HASH: "$2b$12$test_hash_for_ci"
          JWT_SECRET: "ci-test-secret-key-not-for-production"
          ENCRYPTION_KEY: "dGVzdC1lbmNyeXB0aW9uLWtleS0xMjM0NTY3ODkwYWI="
          REDIS_URL: ""
        run: pytest test_main.py -v --tb=short --timeout=60

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            /opt/moltgrid/deploy.sh
